services:
  mettaclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: mettaclaw:secure
    container_name: mettaclaw
    hostname: mettaclaw
    restart: unless-stopped

    # Run as the same fixed UID/GID created in the Dockerfile
    user: "10001:10001"
    working_dir: /app/PeTTa

    # Keep container rootfs immutable
    read_only: true

    # Writable ephemeral runtime paths
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /run:rw,noexec,nosuid,nodev,size=16m

    # Only these paths remain writable/persistent
    volumes:
      - type: bind
        source: ./memory
        target: /app/mettaclaw/memory
        read_only: false
      - type: bind
        source: ./chroma_db
        target: /app/PeTTa/chroma_db
        read_only: false
      - type: bind
        source: ./data
        target: /app/data
        read_only: false
      - type: bind
        source: ./logs
        target: /app/PeTTa/logs
        read_only: false

    # Secrets appear under /run/secrets/
    secrets:
      - telegram_token
      - openai_api_key

    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      TELEGRAM_TOKEN_FILE: /run/secrets/telegram_token
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key

    # Strong privilege reduction
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      # Uncomment when you have a tested host profile:
      # - apparmor=docker-mettaclaw
      # - seccomp=/etc/docker/seccomp-mettaclaw.json

    # Do not publish any ports unless you run webhook mode
    expose: []

    # Resource limits
    mem_limit: 768m
    cpus: 1.0
    pids_limit: 256
    ulimits:
      nofile:
        soft: 4096
        hard: 8192

    # Healthcheck
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; assert os.path.isdir('/app/mettaclaw')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    # Prevent log-based disk exhaustion
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    stop_grace_period: 20s

    networks:
      - bot_internal

    # Optional: extra hardening if your app does not need these
    # ipc: "private"
    # init: true

  # Container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - --docker_only=true
      - --housekeeping_interval=30s
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - monitoring

  # Host metrics
  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node_exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - --path.rootfs=/host
      - --collector.systemd
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /:/host:ro,rslave
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
    secrets:
      - grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - monitoring

networks:
  bot_internal:
    driver: bridge
    internal: false
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

secrets:
  telegram_token:
    file: ./secrets/telegram_token.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt