name: Docker CI

on:
  push:
    branches:
      - main

jobs:
  docker-build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Clear previous Docker cache and history
        run: |
          docker builder prune -af || true
          docker system prune -af || true

      - name: Build image with Compose
        run: docker compose build --no-cache --pull

      - name: Run containerized startup script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ASI_API_KEY: ${{ secrets.ASI_API_KEY }}
          RUN_TIMEOUT: "120"
        run: |
          mkdir -p memory
          docker compose run --rm mettaclaw

      - name: Cleanup containers and volumes
        if: always()
        run: docker compose down --volumes --remove-orphans

  deploy-to-ovh:
    name: Deploy To OVH
    runs-on: ubuntu-latest
    needs: docker-build-and-run
    if: ${{ secrets.OVH_HOST != '' && secrets.OVH_USER != '' && secrets.OVH_SSH_KEY != '' }}

    steps:
      - name: Deploy latest main branch on OVH server
        uses: appleboy/ssh-action@v1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ASI_API_KEY: ${{ secrets.ASI_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          MM_URL: ${{ secrets.MM_URL }}
          MM_CHANNEL_ID: ${{ secrets.MM_CHANNEL_ID }}
          MM_BOT_TOKEN: ${{ secrets.MM_BOT_TOKEN }}
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          port: ${{ secrets.OVH_PORT || '22' }}
          envs: OPENAI_API_KEY,ASI_API_KEY,TG_BOT_TOKEN,TG_CHAT_ID,MM_URL,MM_CHANNEL_ID,MM_BOT_TOKEN
          script: |
            set -eu
            APP_DIR="${{ secrets.OVH_APP_DIR || '/opt/mettaclaw' }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --branch main "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "Docker Compose is not available on OVH host."
              exit 1
            fi

            mkdir -p memory

            umask 077
            : > .env
            printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" >> .env
            printf 'ASI_API_KEY=%s\n' "$ASI_API_KEY" >> .env
            printf 'TG_BOT_TOKEN=%s\n' "$TG_BOT_TOKEN" >> .env
            printf 'TG_CHAT_ID=%s\n' "$TG_CHAT_ID" >> .env
            printf 'MM_URL=%s\n' "$MM_URL" >> .env
            printf 'MM_CHANNEL_ID=%s\n' "$MM_CHANNEL_ID" >> .env
            printf 'MM_BOT_TOKEN=%s\n' "$MM_BOT_TOKEN" >> .env
            printf 'RUN_TIMEOUT=0\n' >> .env
            printf 'RESTART_POLICY=unless-stopped\n' >> .env

            $DC down --remove-orphans --rmi all || true

            docker builder prune -af || true
            docker image prune -af || true
            docker container prune -f || true

            $DC build --no-cache --pull
            $DC up -d --force-recreate
            $DC ps
